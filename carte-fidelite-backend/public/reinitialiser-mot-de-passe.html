<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
    <link rel="icon" href="/logo-bravocard-encadre.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nouveau mot de passe — Bravocard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 20% 10%,#4e2a8a 0,#1b1030 38%,#0e0a16 100%);color:#21192a;font-family:"Work Sans",sans-serif}.carte{width:min(100%,460px);padding:38px;border:1px solid rgba(255,255,255,.16);border-radius:24px;background:#fff;box-shadow:0 30px 80px rgba(0,0,0,.35)}.marque{display:inline-flex;gap:8px;align-items:center;margin-bottom:28px;color:#1b1030;font:800 18px "Manrope"}.icone{display:grid;place-items:center;width:32px;height:32px;border-radius:10px;background:#7145eb;color:#fff}h1{margin:0 0 10px;font:800 30px "Manrope";letter-spacing:-1px}p{margin:0 0 24px;color:#716777;line-height:1.55}label{display:block;margin:16px 0 7px;font-size:13px;font-weight:700}input{width:100%;height:50px;padding:0 14px;border:1px solid #ddd5e4;border-radius:12px;font:500 15px "Work Sans";outline:none}input:focus{border-color:#7145eb;box-shadow:0 0 0 3px rgba(113,69,235,.12)}button{width:100%;height:50px;margin-top:22px;border:0;border-radius:12px;background:#7145eb;color:#fff;font:800 14px "Manrope";cursor:pointer}.message{min-height:20px;margin:16px 0 0;font-size:13px}.message.erreur{color:#b63446}.message.succes{color:#16895f}.retour{display:block;margin-top:18px;color:#6d48cb;text-align:center;text-decoration:none;font-size:13px;font-weight:700}
  </style>
</head>
<body>
  <main class="carte">
    <div class="marque"><span class="icone">✦</span>Bravocard</div>
    <h1>Choisissez votre mot de passe</h1>
    <p>Ce lien est personnel et valable pendant 30 minutes. Utilisez au moins 10 caractères.</p>
    <label for="password">Nouveau mot de passe</label>
    <input id="password" type="password" minlength="10" maxlength="128" autocomplete="new-password">
    <label for="confirmation">Confirmez le mot de passe</label>
    <input id="confirmation" type="password" minlength="10" maxlength="128" autocomplete="new-password">
    <button id="valider">Enregistrer mon mot de passe</button>
    <div class="message" id="message"></div>
    <a class="retour" href="/espace-restaurateur.html">Retour à la connexion</a>
  </main>
  <script>
    const token=new URLSearchParams(location.search).get('token')||'';
    const bouton=document.getElementById('valider');
    const message=document.getElementById('message');
    async function valider(){
      const password=document.getElementById('password').value;
      const confirmation=document.getElementById('confirmation').value;
      message.className='message';
      if(!token){message.textContent='Ce lien est incomplet.';message.classList.add('erreur');return}
      if(password.length<10){message.textContent='Le mot de passe doit contenir au moins 10 caractères.';message.classList.add('erreur');return}
      if(password!==confirmation){message.textContent='Les deux mots de passe ne correspondent pas.';message.classList.add('erreur');return}
      bouton.disabled=true;message.textContent='Enregistrement en cours…';
      try{
        const reponse=await fetch('/api/auth/reinitialiser-mot-de-passe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,password})});
        const donnees=await reponse.json();
        if(!reponse.ok)throw new Error(donnees.erreur||'Impossible de modifier le mot de passe.');
        message.textContent=donnees.message;message.classList.add('succes');
        bouton.style.display='none';
      }catch(erreur){message.textContent=erreur.message;message.classList.add('erreur');bouton.disabled=false}
    }
    bouton.addEventListener('click',valider);
    document.getElementById('confirmation').addEventListener('keydown',e=>{if(e.key==='Enter')valider()});
  </script>
</body>
</html>
