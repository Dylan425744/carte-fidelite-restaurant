<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
    <link rel="icon" href="/logo-bravocard-encadre.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bravocard - Tableau de bord</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Work Sans', sans-serif;
    background: #1B1030;
    color: #FFF9F3;
    min-height: 100vh;
    padding: 24px 16px;
  }
  .conteneur {
    max-width: 900px;
    margin: 0 auto;
  }
  .logo-page {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }
  .logo-page .nom {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 16px;
  }
  .logo-page .nom .accent { color: #12B886; }
  h1 {
    font-family: 'Manrope', sans-serif;
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 4px;
  }
  p.sous-titre {
    color: #B8ABD0;
    font-size: 14px;
    margin-bottom: 24px;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat-carte {
    background: #241A3D;
    border: 1px solid #362A55;
    border-radius: 12px;
    padding: 16px;
  }
  .stat-carte .valeur {
    font-family: 'Manrope', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: #12B886;
  }
  .stat-carte .label {
    font-size: 12px;
    color: #B8ABD0;
    margin-top: 2px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: #241A3D;
    border-radius: 12px;
    overflow: hidden;
  }
  th, td {
    padding: 12px 14px;
    text-align: left;
    font-size: 14px;
    border-bottom: 1px solid #362A55;
  }
  th {
    background: #1B1030;
    color: #B8ABD0;
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
  }
  tr:last-child td { border-bottom: none; }
  .points-badge {
    display: inline-block;
    background: #1F3D2F;
    color: #12B886;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 700;
  }
  .chargement {
    text-align: center;
    color: #B8ABD0;
    padding: 40px;
  }
  @media (max-width: 600px) {
    th:nth-child(2), td:nth-child(2), th:nth-child(3), td:nth-child(3) { display: none; }
  }
</style>
</head>
<body>

<div class="conteneur">
  <div class="logo-page">
    <svg width="20" height="20" viewBox="0 0 200 200"><g transform="rotate(-8 100 100)"><rect x="35" y="55" width="130" height="90" rx="18" fill="#6C3CE9"/></g><path d="M155 45 L163 62 L182 65 L168 79 L172 98 L155 88 L138 98 L142 79 L128 65 L147 62 Z" fill="#12B886"/></svg>
    <div class="nom">Bravo<span class="accent">card</span></div>
  </div>

  <h1>Tableau de bord</h1>
  <p class="sous-titre">Votre établissement</p>
  <p style="text-align:center; margin:0 0 24px;">
    <a href="/admin-designs.html" style="color:#A991F8; font-weight:700; text-decoration:none;">
      Administrer les designs Apple Wallet
    </a>
  </p>

  <div class="stats" id="stats"></div>

  <div id="contenuTable">
    <p class="chargement">Chargement des clients...</p>
  </div>
</div>

<script>
let motDePasseSaisi = null;

async function demanderMotDePasse() {
  const saisie = prompt('Mot de passe du tableau de bord :');
  if (saisie === null) {
    document.getElementById('contenuTable').innerHTML = '<p class="chargement">Accès annulé.</p>';
    return;
  }
  motDePasseSaisi = saisie;
  chargerClients();
}

async function chargerClients() {
  try {
    const reponse = await fetch('/api/clients', {
      headers: { 'x-dashboard-password': motDePasseSaisi || '' }
    });
    const donnees = await reponse.json();

    if (reponse.status === 401) {
      document.getElementById('contenuTable').innerHTML = '<p class="chargement">Mot de passe incorrect.</p>';
      document.getElementById('stats').innerHTML = '';
      return;
    }

    if (!reponse.ok) throw new Error(donnees.erreur || 'Erreur de chargement');

    const clients = donnees.clients;

    const totalClients = clients.length;
    const totalPoints = clients.reduce((somme, c) => somme + c.points, 0);
    const clientActif = clients.filter(c => c.points > 0).length;

    document.getElementById('stats').innerHTML = `
      <div class="stat-carte">
        <div class="valeur">${totalClients}</div>
        <div class="label">Clients inscrits</div>
      </div>
      <div class="stat-carte">
        <div class="valeur">${clientActif}</div>
        <div class="label">Clients actifs</div>
      </div>
      <div class="stat-carte">
        <div class="valeur">${totalPoints}</div>
        <div class="label">Points cumulés</div>
      </div>
    `;

    if (clients.length === 0) {
      document.getElementById('contenuTable').innerHTML = '<p class="chargement">Aucun client pour le moment.</p>';
      return;
    }

    let lignesTableau = clients.map(client => `
      <tr>
        <td>${client.nom}</td>
        <td>${client.email}</td>
        <td>${client.telephone || '-'}</td>
        <td><span class="points-badge">${client.points} pts</span></td>
      </tr>
    `).join('');

    document.getElementById('contenuTable').innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Nom</th>
            <th>Email</th>
            <th>Téléphone</th>
            <th>Points</th>
          </tr>
        </thead>
        <tbody>${lignesTableau}</tbody>
      </table>
    `;

  } catch (erreur) {
    document.getElementById('contenuTable').innerHTML = '<p class="chargement">Erreur : ' + erreur.message + '</p>';
  }
}

demanderMotDePasse();
setInterval(() => { if (motDePasseSaisi) chargerClients(); }, 30000);
</script>

</body>
</html>
