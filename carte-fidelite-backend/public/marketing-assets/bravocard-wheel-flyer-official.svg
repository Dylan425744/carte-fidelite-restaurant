<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1500" role="img" aria-labelledby="title desc">
  <title id="title">Flyer vectoriel Bravocard — roue cadeau</title>
  <desc id="desc">Flyer transparent et personnalisable avec roue premium, vrai QR vectoriel et parcours en trois étapes.</desc>
  <defs>
    <!-- Toutes les couleurs décoratives utilisent des classes sémantiques. -->
    <radialGradient id="segment-dark" cx="30%" cy="24%" r="92%"><stop offset="0" class="flyer-primary-stop" stop-color="#6730C8"/><stop offset=".52" class="flyer-primary-stop" stop-color="#5421AF"/><stop offset="1" class="flyer-primary-deep-stop" stop-color="#21073E"/></radialGradient>
    <radialGradient id="segment-light" cx="30%" cy="22%" r="94%"><stop offset="0" class="flyer-secondary-light-stop" stop-color="#F3E9FF"/><stop offset=".58" class="flyer-secondary-stop" stop-color="#CBA8F3"/><stop offset="1" class="flyer-primary-stop" stop-color="#6B31C4"/></radialGradient>
    <linearGradient id="outer-frame" x1="0" y1="0" x2="1" y2="1"><stop offset="0" class="flyer-secondary-light-stop" stop-color="#EAD8FF"/><stop offset=".12" class="flyer-primary-stop" stop-color="#7A38D1"/><stop offset=".48" class="flyer-primary-deep-stop" stop-color="#240642"/><stop offset=".78" class="flyer-primary-stop" stop-color="#6A22BF"/><stop offset="1" class="flyer-primary-deep-stop" stop-color="#1C0435"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1"><stop offset="0" class="flyer-accent-light-stop" stop-color="#FFF0A7"/><stop offset=".22" class="flyer-accent-stop" stop-color="#E2AC37"/><stop offset=".48" class="flyer-accent-deep-stop" stop-color="#7C3B08"/><stop offset=".72" class="flyer-accent-light-stop" stop-color="#FFF0A7"/><stop offset="1" class="flyer-accent-stop" stop-color="#D59524"/></linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7F708F"/><stop offset=".18" stop-color="#FFFFFF"/><stop offset=".5" stop-color="#D8D0DF"/><stop offset=".76" stop-color="#FFFFFF"/><stop offset="1" stop-color="#695979"/></linearGradient>
    <radialGradient id="hub" cx="30%" cy="25%" r="80%"><stop offset="0" class="flyer-primary-stop" stop-color="#7440C9"/><stop offset="1" class="flyer-primary-deep-stop" stop-color="#22063E"/></radialGradient>
    <radialGradient id="purple-lamp" cx="35%" cy="28%" r="72%"><stop offset="0" stop-color="#FFFFFF"/><stop offset=".28" class="flyer-secondary-light-stop" stop-color="#F4E5FF"/><stop offset=".68" class="flyer-primary-stop" stop-color="#9C43EC"/><stop offset="1" class="flyer-primary-deep-stop" stop-color="#3A075F"/></radialGradient>
    <radialGradient id="gold-lamp" cx="32%" cy="28%" r="74%"><stop offset="0" stop-color="#FFFCE5"/><stop offset=".28" class="flyer-accent-light-stop" stop-color="#FFF0A7"/><stop offset=".68" class="flyer-accent-stop" stop-color="#E2AC37"/><stop offset="1" class="flyer-accent-deep-stop" stop-color="#743006"/></radialGradient>
    <linearGradient id="qr-card" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFFFFF"/><stop offset=".7" stop-color="#F7F4FA"/><stop offset="1" class="flyer-secondary-light-stop" stop-color="#EEE3FA"/></linearGradient>
    <linearGradient id="flyer-background" x1="0" y1="0" x2="1" y2="1"><stop offset="0" class="flyer-background-secondary-stop" stop-color="#432B59"/><stop offset=".44" class="flyer-background-primary-stop" stop-color="#2A1742"/><stop offset=".78" class="flyer-background-primary-deep-stop" stop-color="#170C27"/><stop offset="1" stop-color="#09070D"/></linearGradient>
    <radialGradient id="flyer-top-glow" cx="50%" cy="18%" r="62%"><stop offset="0" class="flyer-secondary-stop" stop-color="#CBA8F3" stop-opacity=".28"/><stop offset=".55" class="flyer-primary-stop" stop-color="#6730C8" stop-opacity=".12"/><stop offset="1" class="flyer-primary-stop" stop-color="#6730C8" stop-opacity="0"/></radialGradient>
    <radialGradient id="flyer-floor-glow" cx="52%" cy="77%" r="58%"><stop offset="0" class="flyer-primary-stop" stop-color="#6730C8" stop-opacity=".2"/><stop offset="1" class="flyer-primary-deep-stop" stop-color="#21073E" stop-opacity="0"/></radialGradient>
    <filter id="wheel-shadow" x="-35%" y="-35%" width="180%" height="190%"><feDropShadow dx="0" dy="24" stdDeviation="20" flood-color="#180529" flood-opacity=".38"/></filter>
    <filter id="card-shadow" x="-40%" y="-40%" width="190%" height="190%"><feDropShadow dx="8" dy="15" stdDeviation="12" flood-color="#170A22" flood-opacity=".3"/></filter>
    <filter id="glow" x="-300%" y="-300%" width="700%" height="700%"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="face"><circle cx="500" cy="675" r="286"/></clipPath>
  </defs>

  <!-- Fond premium calculé à partir des couleurs du restaurant. -->
  <rect width="1000" height="1500" fill="url(#flyer-background)"/>
  <rect width="1000" height="1500" fill="url(#flyer-top-glow)"/>
  <rect width="1000" height="1500" fill="url(#flyer-floor-glow)"/>
  <path d="M0 1175C245 1118 764 1122 1000 1187V1500H0Z" fill="#08070B" opacity=".24"/>
  <g id="titles" text-anchor="middle">
    <text x="500" y="96" class="flyer-surface-text" fill="#FFF9EF" font-family="Georgia, Times New Roman, serif" font-size="69" font-weight="700" letter-spacing="1">FAITES TOURNER</text>
    <text x="500" y="174" class="flyer-surface-text" fill="#FFF9EF" font-family="Georgia, Times New Roman, serif" font-size="69" font-weight="700" letter-spacing="1">LA ROUE ET GAGNEZ !</text>
    <line x1="110" y1="228" x2="170" y2="228" class="flyer-accent-stroke" stroke="#C68C20" stroke-width="2"/>
    <text x="500" y="236" class="flyer-accent-text" fill="#F0B45A" font-family="Inter, Helvetica, Arial, sans-serif" font-size="23" font-weight="800" letter-spacing="2">TENTEZ VOTRE CHANCE À CHAQUE VISITE</text>
    <line x1="830" y1="228" x2="890" y2="228" class="flyer-accent-stroke" stroke="#C68C20" stroke-width="2"/>
  </g>

  <g id="premium-wheel" filter="url(#wheel-shadow)">
    <circle cx="500" cy="675" r="350" class="flyer-primary-fill" fill="#2B074C" stroke="url(#accent)" stroke-width="6"/>
    <circle cx="500" cy="675" r="338" fill="none" stroke="url(#outer-frame)" stroke-width="45"/>
    <circle cx="500" cy="675" r="338" fill="none" class="flyer-secondary-stroke" stroke="#E8D5FF" stroke-opacity=".78" stroke-width="2"/>
    <circle cx="500" cy="675" r="315" fill="none" class="flyer-primary-deep-stroke" stroke="#21043B" stroke-width="5"/>
    <circle cx="500" cy="675" r="306" fill="none" stroke="url(#accent)" stroke-width="12"/>
    <circle cx="500" cy="675" r="298" fill="none" stroke="#FFF4C4" stroke-opacity=".86" stroke-width="2"/>
    <circle cx="500" cy="675" r="291" class="flyer-primary-deep-fill" fill="#250741" stroke="#D9BCF3" stroke-width="4"/>

    <g id="segments" clip-path="url(#face)" stroke="#F4ECFF" stroke-width="3" stroke-linejoin="round">
      <path d="M500 675L500 389A286 286 0 0 1 702.23 472.77Z" fill="url(#segment-dark)"/>
      <path d="M500 675L702.23 472.77A286 286 0 0 1 786 675Z" fill="url(#segment-light)"/>
      <path d="M500 675L786 675A286 286 0 0 1 702.23 877.23Z" fill="url(#segment-dark)"/>
      <path d="M500 675L702.23 877.23A286 286 0 0 1 500 961Z" fill="url(#segment-light)"/>
      <path d="M500 675L500 961A286 286 0 0 1 297.77 877.23Z" fill="url(#segment-dark)"/>
      <path d="M500 675L297.77 877.23A286 286 0 0 1 214 675Z" fill="url(#segment-light)"/>
      <path d="M500 675L214 675A286 286 0 0 1 297.77 472.77Z" fill="url(#segment-dark)"/>
      <path d="M500 675L297.77 472.77A286 286 0 0 1 500 389Z" fill="url(#segment-light)"/>
      <ellipse cx="405" cy="528" rx="145" ry="65" fill="#FFFFFF" opacity=".075" transform="rotate(-28 405 528)" stroke="none"/>
    </g>

    <g id="labels" font-family="Inter, Helvetica, Arial, sans-serif" font-size="29" font-weight="900" text-anchor="middle" dominant-baseline="middle">
      <text x="580" y="452" class="flyer-light-text" fill="#FFFFFF" transform="rotate(20 580 452)">GAGNÉ</text><text x="718" y="576" class="flyer-dark-text" fill="#2A1040" transform="rotate(66 718 576)">GAGNÉ</text>
      <text x="718" y="764" class="flyer-light-text" fill="#FFFFFF" transform="rotate(-66 718 764)">GAGNÉ</text><text x="580" y="900" class="flyer-dark-text" fill="#2A1040" transform="rotate(-22 580 900)">GAGNÉ</text>
      <text x="420" y="900" class="flyer-light-text" fill="#FFFFFF" transform="rotate(22 420 900)">GAGNÉ</text><text x="282" y="764" class="flyer-dark-text" fill="#2A1040" transform="rotate(66 282 764)">GAGNÉ</text>
      <text x="282" y="576" class="flyer-light-text" fill="#FFFFFF" transform="rotate(-66 282 576)">GAGNÉ</text><text x="420" y="452" class="flyer-dark-text" fill="#2A1040" transform="rotate(-20 420 452)">GAGNÉ</text>
    </g>

    <g id="lamps">
      <g fill="url(#purple-lamp)" stroke="#FFFFFF" stroke-width="1.5" filter="url(#glow)"><circle cx="500" cy="337" r="9"/><circle cx="739" cy="436" r="9"/><circle cx="838" cy="675" r="9"/><circle cx="739" cy="914" r="9"/><circle cx="500" cy="1013" r="9"/><circle cx="261" cy="914" r="9"/><circle cx="162" cy="675" r="9"/><circle cx="261" cy="436" r="9"/></g>
      <g fill="url(#gold-lamp)" stroke="#743006" stroke-width="2"><circle cx="371" cy="363" r="8"/><circle cx="629" cy="363" r="8"/><circle cx="812" cy="546" r="8"/><circle cx="812" cy="804" r="8"/><circle cx="629" cy="987" r="8"/><circle cx="371" cy="987" r="8"/><circle cx="188" cy="804" r="8"/><circle cx="188" cy="546" r="8"/></g>
    </g>

    <g id="hub"><circle cx="500" cy="675" r="88" class="flyer-primary-deep-fill" fill="#2C0A48" opacity=".55"/><circle cx="500" cy="675" r="76" fill="url(#silver)" class="flyer-primary-deep-stroke" stroke="#3A1554" stroke-width="7"/><circle cx="500" cy="675" r="59" fill="url(#hub)" class="flyer-secondary-stroke" stroke="#A85BE0" stroke-width="4"/><ellipse cx="483" cy="652" rx="31" ry="14" fill="#FFFFFF" opacity=".1" transform="rotate(-20 483 652)"/></g>

    <g id="pointer" filter="url(#glow)"><path d="M463 301Q500 287 537 301L515 380Q510 399 500 415Q490 399 485 380Z" fill="url(#accent)" stroke="#FFF1AF" stroke-width="3" stroke-linejoin="round"/><path d="M475 311Q500 303 525 311L509 374Q506 387 500 397Q494 387 491 374Z" fill="url(#outer-frame)" class="flyer-primary-deep-stroke" stroke="#3B0758" stroke-width="4"/><path d="M484 317Q500 312 516 317" fill="none" class="flyer-secondary-stroke" stroke="#EFD7FF" stroke-width="3" stroke-linecap="round"/><circle cx="500" cy="334" r="5" fill="#FFFFFF" filter="url(#glow)"/></g>
  </g>

  <!-- Carte QR vectorielle, destinée à recevoir le QR réel du restaurant -->
  <g id="qr-card" transform="rotate(6 760 885)" filter="url(#card-shadow)">
    <rect x="630" y="758" width="270" height="337" rx="34" class="flyer-primary-fill" fill="#4D168D" opacity=".18"/>
    <rect x="617" y="744" width="270" height="337" rx="34" fill="url(#qr-card)" class="flyer-secondary-stroke" stroke="#CBA8F3" stroke-width="3"/>
    <text x="752" y="794" class="flyer-primary-text" fill="#2B0A51" font-family="Inter, Helvetica, Arial, sans-serif" font-size="25" font-weight="900" text-anchor="middle">SCANNEZ-MOI</text>
    <rect x="650" y="817" width="204" height="204" rx="12" fill="#FFFFFF" class="flyer-primary-stroke" stroke="#6A2EB9" stroke-width="2"/>
    <svg x="662" y="829" width="180" height="180" viewBox="0 0 45 45" shape-rendering="crispEdges"><path fill="#FFFFFF" d="M0 0h45v45H0z"/><path stroke="#111111" d="M2 2.5h7m1 0h2m1 0h1m4 0h2m1 0h2m2 0h1m1 0h1m2 0h2m1 0h2m1 0h7M2 3.5h1m5 0h1m1 0h1m1 0h5m2 0h2m1 0h1m1 0h1m2 0h4m3 0h1m1 0h1m5 0h1M2 4.5h1m1 0h3m1 0h1m1 0h1m2 0h1m2 0h1m1 0h2m2 0h1m2 0h1m1 0h1m1 0h2m3 0h1m1 0h1m1 0h3m1 0h1M2 5.5h1m1 0h3m1 0h1m3 0h3m4 0h1m1 0h3m1 0h1m2 0h1m1 0h2m2 0h1m1 0h1m1 0h3m1 0h1M2 6.5h1m1 0h3m1 0h1m2 0h1m2 0h1m1 0h1m2 0h1m2 0h1m1 0h1m1 0h2m2 0h1m1 0h3m1 0h1m1 0h3m1 0h1M2 7.5h1m5 0h1m1 0h1m1 0h2m2 0h3m3 0h1m3 0h2m1 0h1m1 0h2m1 0h1m1 0h1m5 0h1M2 8.5h7m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h7M10 9.5h1m1 0h1m3 0h6m2 0h1m3 0h2m2 0h1M4 10.5h3m1 0h1m1 0h2m3 0h1m1 0h4m1 0h2m2 0h3m2 0h1m3 0h3m2 0h3M2 11.5h1m2 0h3m3 0h1m1 0h4m1 0h1m1 0h4m1 0h4m1 0h1m2 0h2m1 0h3m1 0h3M3 12.5h6m3 0h8m1 0h2m1 0h4m1 0h4m1 0h1m1 0h3M4 13.5h1m2 0h1m1 0h2m4 0h1m2 0h1m1 0h6m4 0h1m1 0h3m2 0h3M4 14.5h6m1 0h1m1 0h2m2 0h1m1 0h4m3 0h1m3 0h2m1 0h1m3 0h1m1 0h2M4 15.5h3m2 0h2m2 0h1m3 0h3m1 0h2m1 0h4m1 0h1m3 0h6m2 0h2M4 16.5h3m1 0h2m2 0h1m3 0h2m1 0h2m2 0h1m1 0h3m1 0h4m1 0h2m4 0h1M5 17.5h2m2 0h1m1 0h1m1 0h4m3 0h1m3 0h1m1 0h1m2 0h1m2 0h1m3 0h4M3 18.5h1m2 0h3m1 0h2m1 0h2m1 0h3m2 0h1m1 0h4m1 0h4m2 0h2m1 0h1m2 0h1m1 0h1M2 19.5h4m4 0h1m1 0h4m1 0h3m1 0h3m3 0h1m3 0h4m1 0h5m1 0h1M2 20.5h1m5 0h3m3 0h1m4 0h1m6 0h1m2 0h1m4 0h2m2 0h1M4 21.5h2m1 0h1m2 0h1m2 0h1m1 0h2m1 0h4m1 0h1m1 0h1m1 0h4m4 0h2m1 0h1M3 22.5h1m2 0h1m1 0h2m3 0h1m3 0h1m3 0h2m1 0h2m1 0h3m1 0h1m3 0h1m3 0h3M2 23.5h4m5 0h2m1 0h1m1 0h1m2 0h1m1 0h3m1 0h1m1 0h1m2 0h1m1 0h5m1 0h5M4 24.5h3m1 0h1m1 0h2m2 0h3m1 0h1m1 0h8m1 0h1m1 0h2m1 0h2m1 0h2M3 25.5h1m3 0h1m1 0h9m1 0h2m5 0h3m1 0h1m1 0h2m2 0h1m1 0h2m2 0h1M2 26.5h8m2 0h1m1 0h1m1 0h2m1 0h4m1 0h2m1 0h1m3 0h1m8 0h1M3 27.5h2m4 0h1m1 0h1m1 0h3m3 0h1m3 0h1m6 0h1m1 0h2m2 0h4m1 0h2M2 28.5h1m1 0h2m1 0h3m1 0h2m1 0h1m1 0h5m1 0h1m5 0h2m4 0h1M4 29.5h2m1 0h1m1 0h2m3 0h1m3 0h2m1 0h8m1 0h1m1 0h5m1 0h2m1 0h2M2 30.