    <text x="752" y="1052" class="flyer-primary-text" fill="#2B0A51" font-family="Inter, Helvetica, Arial, sans-serif" font-size="16" font-weight="800" text-anchor="middle" letter-spacing="1">TENTEZ VOTRE CHANCE</text>
  </g>

  <g id="three-steps" font-family="Inter, Helvetica, Arial, sans-serif">
    <line x1="348" y1="1188" x2="348" y2="1288" class="flyer-accent-stroke" stroke="#F0B45A" stroke-width="2" opacity=".62"/><line x1="677" y1="1188" x2="677" y2="1288" class="flyer-accent-stroke" stroke="#F0B45A" stroke-width="2" opacity=".62"/>
    <g transform="translate(72 1170)" fill="none" class="flyer-accent-stroke" stroke="#F0B45A" stroke-width="3"><circle cx="43" cy="43" r="40"/><rect x="29" y="20" width="28" height="46" rx="5"/><rect x="35" y="31" width="16" height="16"/><circle cx="43" cy="57" r="2"/></g>
    <circle cx="205" cy="1192" r="20" class="flyer-primary-fill" fill="#5420A8"/><text x="205" y="1200" fill="#FFFFFF" font-size="23" font-weight="900" text-anchor="middle">1</text><text x="205" y="1240" class="flyer-surface-text" fill="#FFF9EF" font-size="20" font-weight="900">Scannez</text><text x="205" y="1271" class="flyer-surface-muted-text" fill="#E9DEEF" font-size="18">le QR code</text>
    <g transform="translate(381 1170)" fill="none" class="flyer-accent-stroke" stroke="#F0B45A" stroke-width="3"><circle cx="43" cy="43" r="40"/><circle cx="43" cy="43" r="27"/><path d="M43 16v54M16 43h54M24 24l38 38M62 24L24 62"/></g>
    <circle cx="520" cy="1192" r="20" class="flyer-primary-fill" fill="#5420A8"/><text x="520" y="1200" fill="#FFFFFF" font-size="23" font-weight="900" text-anchor="middle">2</text><text x="520" y="1240" class="flyer-surface-text" fill="#FFF9EF" font-size="20" font-weight="900">Faites tourner</text><text x="520" y="1271" class="flyer-surface-muted-text" fill="#E9DEEF" font-size="18">la roue</text>
    <g transform="translate(710 1170)" fill="none" class="flyer-accent-stroke" stroke="#F0B45A" stroke-width="3"><circle cx="43" cy="43" r="40"/><rect x="22" y="38" width="42" height="32" rx="3"/><rect x="18" y="29" width="50" height="13" rx="3"/><path d="M43 29v41M43 29c-16-2-21-16-11-20 9-3 13 8 11 20M43 29c16-2 21-16 11-20-9-3-13 8-11 20"/></g>
    <circle cx="848" cy="1192" r="20" class="flyer-primary-fill" fill="#5420A8"/><text x="848" y="1200" fill="#FFFFFF" font-size="23" font-weight="900" text-anchor="middle">3</text><text x="848" y="1240" class="flyer-surface-text" fill="#FFF9EF" font-size="20" font-weight="900">Découvrez</text><text x="848" y="1271" class="flyer-surface-muted-text" fill="#E9DEEF" font-size="18">votre gain</text>
    <line x1="115" y1="1370" x2="240" y2="1370" class="flyer-accent-stroke" stroke="#B77A18" stroke-width="2"/><line x1="760" y1="1370" x2="885" y2="1370" class="flyer-accent-stroke" stroke="#B77A18" stroke-width="2"/>
    <text x="500" y="1378" class="flyer-accent-text" fill="#F0B45A" font-size="19" font-weight="900" letter-spacing="2" text-anchor="middle">AUCUNE APPLICATION À TÉLÉCHARGER</text>
  </g>
</svg>
