<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1400" role="img" aria-labelledby="title desc">
  <title id="title">Illustration officielle d’ajout de la carte Bravocard</title>
  <desc id="desc">Téléphone, carte QR, boutons Wallet et parcours en trois étapes, sur fond transparent.</desc>
  <defs>
    <filter id="phone-shadow" x="-35%" y="-25%" width="180%" height="170%"><feDropShadow dx="2" dy="22" stdDeviation="18" flood-color="#0A0710" flood-opacity=".48"/></filter>
    <filter id="card-shadow" x="-35%" y="-30%" width="180%" height="180%"><feDropShadow dx="10" dy="20" stdDeviation="15" flood-color="#150C1E" flood-opacity=".35"/></filter>
    <linearGradient id="phone-metal" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ECE8E2"/><stop offset=".08" stop-color="#4D4A4D"/><stop offset=".23" stop-color="#151416"/><stop offset=".75" stop-color="#050506"/><stop offset=".92" stop-color="#8B857E"/><stop offset="1" stop-color="#201E20"/></linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1B1C1E"/><stop offset=".42" stop-color="#070809"/><stop offset="1" stop-color="#161819"/></linearGradient>
    <linearGradient id="wallet-pass" x1="0" y1="0" x2="1" y2="1"><stop offset="0" class="wallet-secondary-stop" stop-color="#D8B56A"/><stop offset=".18" class="wallet-primary-stop" stop-color="#7C4DFF"/><stop offset="1" class="wallet-primary-deep-stop" stop-color="#24103F"/></linearGradient>
    <linearGradient id="qr-card" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFFEFB"/><stop offset=".55" stop-color="#F4F0E9"/><stop offset="1" stop-color="#E8E1D9"/></linearGradient>
    <linearGradient id="wallet-google" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#E6E9F7"/><stop offset="1" stop-color="#CCD5F5"/></linearGradient>
    <linearGradient id="brand-gradient" x1="0" y1="0" x2="1" y2="1"><stop offset="0" class="wallet-primary-stop" stop-color="#7C4DFF"/><stop offset="1" class="wallet-secondary-stop" stop-color="#D8B56A"/></linearGradient>
  </defs>

  <!-- Téléphone vectoriel -->
  <g id="phone-artwork" transform="rotate(-4 360 760)" filter="url(#phone-shadow)">
    <rect x="142" y="355" width="410" height="735" rx="76" fill="#09090A" opacity=".38"/>
    <rect x="130" y="335" width="410" height="735" rx="76" fill="url(#phone-metal)" stroke="#D7D0C8" stroke-width="4"/>
    <rect x="149" y="354" width="372" height="697" rx="58" fill="url(#screen)" stroke="#2D2C2F" stroke-width="2"/>
    <rect x="263" y="365" width="145" height="31" rx="15" fill="#020203"/>
    <circle cx="386" cy="380" r="4" fill="#181A1E"/>
    <rect x="119" y="470" width="10" height="72" rx="5" fill="#49464A"/><rect x="119" y="565" width="10" height="112" rx="5" fill="#49464A"/>
    <rect x="540" y="490" width="9" height="140" rx="4.5" fill="#353237"/>
    <text x="185" y="401" fill="#FFFFFF" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">9:41</text>
    <g transform="translate(430 381)" fill="#FFFFFF"><rect width="4" height="7" rx="1"/><rect x="7" y="-3" width="4" height="10" rx="1"/><rect x="14" y="-7" width="4" height="14" rx="1"/><path d="M25 1q8-8 16 0M29 4q4-4 8 0" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/><rect x="47" y="-8" width="25" height="13" rx="3" fill="none" stroke="#fff" stroke-width="2"/><rect x="73" y="-4" width="3" height="5" rx="1"/></g>

    <rect x="184" y="462" width="302" height="184" rx="20" fill="url(#wallet-pass)" stroke="#FFFFFF" stroke-opacity=".12"/>
    <ellipse cx="248" cy="490" rx="62" ry="23" fill="#FFFFFF" opacity=".08" transform="rotate(-18 248 490)"/>
    <text x="438" y="500" fill="#FFFFFF" fill-opacity=".82" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="800" text-anchor="end">FIDÉLITÉ</text>
    <text x="208" y="593" fill="#FFFFFF" font-family="Helvetica, Arial, sans-serif" font-size="17" font-weight="700">CARTE DE FIDÉLITÉ</text>
    <text x="208" y="618" fill="#FFFFFF" fill-opacity=".9" font-family="Helvetica, Arial, sans-serif" font-size="15">Merci pour votre fidélité !</text>
    <circle cx="337" cy="714" r="35" fill="none" class="wallet-primary-stroke" stroke="#7C4DFF" stroke-width="3"/>
    <path d="M321 714l11 11 23-29" fill="none" class="wallet-primary-stroke" stroke="#7C4DFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="337" y="775" fill="#F1EEF4" font-family="Helvetica, Arial, sans-serif" font-size="18" text-anchor="middle">Ajoutée</text>

    <g opacity=".96"><rect x="208" y="936" width="255" height="60" rx="11" fill="#5E584D"/><rect x="208" y="925" width="255" height="60" rx="11" fill="#8E856F"/><rect x="208" y="914" width="255" height="60" rx="11" fill="#C5B890"/><rect x="208" y="903" width="255" height="60" rx="11" fill="#4C493F"/></g>
    <rect x="286" y="1020" width="103" height="5" rx="2.5" fill="#F3F1F3"/>
  </g>

  <!-- Carte QR : sa zone centrale reste vide pour recevoir le vrai QR -->
  <g id="qr-card-artwork" transform="rotate(7 710 820)" filter="url(#card-shadow)">
    <rect x="525" y="610" width="360" height="445" rx="42" fill="#D3CBC4" opacity=".4"/>
    <rect x="512" y="592" width="360" height="445" rx="42" fill="url(#qr-card)" stroke="#DBD4CD" stroke-width="3"/>
    <rect x="543" y="630" width="298" height="260" rx="14" fill="#FFFFFF"/>

    <rect x="552" y="908" width="280" height="62" rx="12" fill="#070708"/>
    <g transform="translate(570 920)"><rect width="38" height="38" rx="8" fill="#fff"/><path d="M7 9h24v5H7z" fill="#f4b53f"/><path d="M7 15h24v5H7z" fill="#50a96b"/><path d="M7 21h24v5H7z" fill="#e64e57"/><path d="M7 27h24v3H7z" fill="#4d75cf"/></g>
    <text x="624" y="932" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="12">Ajouter à</text><text x="624" y="956" fill="#fff" font-family="Helvetica, Arial, sans-serif" font-size="22">Apple Wallet</text>

    <rect x="552" y="980" width="280" height="62" rx="12" fill="url(#wallet-google)"/>
    <g transform="translate(570 992)"><rect width="38" height="38" rx="8" fill="#fff"/><path d="M7 8l24 5v6L7 15z" fill="#f3bd3e"/><path d="M7 15l24 4v7L7 23z" fill="#e84b4f"/><path d="M7 23l24 3v5L7 30z" fill="#4578d0"/><path d="M7 12v18l9-8z" fill="#3ba86b"/></g>
    <text x="624" y="1004" fill="#24212B" font-family="Helvetica, Arial, sans-serif" font-size="12">Ajouter à</text><text x="624" y="1028" fill="#24212B" font-family="Helvetica, Arial, sans-serif" font-size="22">Google Wallet</text>
  </g>

  <!-- Parcours en trois étapes -->
  <g id="three-steps" class="wallet-text-fill" fill="#F7F3F8" font-family="Helvetica, Arial, sans-serif">
    <line x1="337" y1="1125" x2="337" y2="1208" class="wallet-secondary-stroke" stroke="#D8B56A" stroke-width="2"/><line x1="664" y1="1125" x2="664" y2="1208" class="wallet-secondary-stroke" stroke="#D8B56A" stroke-width="2"/>
    <g transform="translate(82 1110)" fill="none" class="wallet-secondary-stroke" stroke="#D8B56A" stroke-width="3"><circle cx="42" cy="42" r="40"/><rect x="28" y="20" width="28" height="45" rx="5"/><rect x="34" y="31" width="16" height="16"/><circle cx="42" cy="57" r="2"/></g>
    <text x="170" y="1146" class="wallet-secondary-fill" fill="#D8B56A" font-size="28" font-weight="800">1</text><text x="170" y="1176" font-size="19" font-weight="800">Scannez</text><text x="170" y="1203" font-size="17">le QR code</text>
    <g transform="translate(375 1110)" fill="none" class="wallet-secondary-stroke" stroke="#D8B56A" stroke-width="3"><circle cx="42" cy="42" r="40"/><rect x="27" y="18" width="30" height="50" rx="5"/><rect x="32" y="44" width="20" height="15" rx="3"/><path d="M38 38l5-6 5 6"/></g>
    <text x="465" y="1146" class="wallet-secondary-fill" fill="#D8B56A" font-size="28" font-weight="800">2</text><text x="465" y="1176" font-size="19" font-weight="800">Ajoutez la carte</text><text x="465" y="1203" font-size="17">à votre téléphone</text>
    <g transform="translate(700 1110)" fill="none" class="wallet-secondary-stroke" stroke="#D8B56A" stroke-width="3"><circle cx="42" cy="42" r="40"/><rect x="18" y="22" width="48" height="30" rx="5"/><path d="M42 42v28M42 56l-13-7M42 56l12 10" stroke-linecap="round"/></g>
    <text x="790" y="1146" class="wallet-secondary-fill" fill="#D8B56A" font-size="28" font-weight="800">3</text><text x="790" y="1176" font-size="19" font-weight="800">Présentez-la</text><text x="790" y="1203" font-size="17">à chaque visite</text>
    <line x1="90" y1="1260" x2="205" y2="1260" class="wallet-secondary-stroke" stroke="#D8B56A" stroke-width="2"/><line x1="795" y1="1260" x2="910" y2="1260" class="wallet-secondary-stroke" stroke="#D8B56A" stroke-width="2"/>
    <text x="500" y="1268" class="wallet-secondary-fill" fill="#D8B56A" font-size="20" font-weight="800" letter-spacing="3" text-anchor="middle">AUCUNE APPLICATION À TÉLÉCHARGER</text>
  </g>
</svg>
