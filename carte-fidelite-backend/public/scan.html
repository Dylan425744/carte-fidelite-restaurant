<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Coin des amis - Scan</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1b1f24;
    color: #f5f0e6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 {
    font-size: 20px;
    color: #e8a33d;
    margin: 16px 0 4px;
    text-align: center;
  }
  p.sous-titre {
    color: #a8a29a;
    font-size: 13px;
    margin-bottom: 20px;
    text-align: center;
  }
  #lecteur {
    width: 100%;
    max-width: 400px;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid #353b42;
  }
  .bouton {
    width: 100%;
    max-width: 400px;
    margin-top: 20px;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #e8a33d;
    color: #1b1f24;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  .bouton:hover { background: #f0b45a; }
  .resultat {
    width: 100%;
    max-width: 400px;
    margin-top: 20px;
    padding: 20px;
    border-radius: 14px;
    text-align: center;
    display: none;
  }
  .resultat.visible { display: block; }
  .resultat.succes { background: #1f3d2b; border: 1px solid #2f6b45; }
  .resultat.erreur { background: #3d1f1f; border: 1px solid #6b2f2f; }
  .resultat .nom-client { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .resultat .solde { font-size: 32px; font-weight: 700; color: #e8a33d; margin: 8px 0; }
</style>
</head>
<body>

<h1>Le Coin des amis</h1>
<p class="sous-titre">Scannez la carte du client pour ajouter un point</p>

<div id="lecteur"></div>

<button class="bouton" id="boutonRelancer" style="display:none;">Scanner un autre client</button>

<div class="resultat" id="resultat"></div>

<script>
const resultatDiv = document.getElementById('resultat');
const boutonRelancer = document.getElementById('boutonRelancer');
let lecteurQR;
let traitementEnCours = false;

function demarrerScan() {
  resultatDiv.classList.remove('visible');
  boutonRelancer.style.display = 'none';
  document.getElementById('lecteur').style.display = 'block';
  traitementEnCours = false;

  lecteurQR = new Html5Qrcode("lecteur");
  lecteurQR.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSucces
  ).catch(function(err) {
    resultatDiv.innerHTML = "Impossible d'acceder a la camera. Verifiez les autorisations de votre navigateur.";
    resultatDiv.className = 'resultat erreur visible';
  });
}

async function onScanSucces(decodedText) {
  if (traitementEnCours) return;
  traitementEnCours = true;

  await lecteurQR.stop();
  document.getElementById('lecteur').style.display = 'none';
  boutonRelancer.style.display = 'block';

  try {
    const reponse = await fetch('/api/scan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ client_id: decodedText })
    });

    const donnees = await reponse.json();

    if (!reponse.ok) {
      throw new Error(donnees.erreur || 'Client introuvable');
    }

    resultatDiv.innerHTML =
      '<div class="nom-client">Point ajoute !</div>' +
      '<div class="solde">' + donnees.nouveauSolde + ' points</div>';
    resultatDiv.className = 'resultat succes visible';

  } catch (erreur) {
    resultatDiv.innerHTML = 'Erreur : ' + erreur.message;
    resultatDiv.className = 'resultat erreur visible';
  }
}

boutonRelancer.addEventListener('click', demarrerScan);

demarrerScan();
</script>

</body>
</html>
