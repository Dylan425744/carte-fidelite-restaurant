<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bravocard - Créez votre carte de fidélité</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Work Sans', sans-serif;
    background: #1B1030;
    color: #FFF9F3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .logo-page {
    position: fixed;
    top: 24px;
    left: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-page .nom {
    font-family: 'Manrope', sans-serif;
    font-weight: 800;
    font-size: 16px;
  }
  .logo-page .nom .accent { color: #12B886; }
  .carte {
    background: #241A3D;
    border-radius: 20px;
    padding: 36px 28px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 30px 60px rgba(27,16,48,0.4);
    border: 1px solid #362A55;
  }
  h1 {
    font-family: 'Manrope', sans-serif;
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 6px;
  }
  p.sous-titre {
    color: #B8ABD0;
    font-size: 14px;
    margin-bottom: 28px;
  }
  label {
    display: block;
    font-size: 13px;
    color: #C9C0DC;
    margin-bottom: 6px;
    margin-top: 16px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #3D2F5C;
    background: #1B1030;
    color: #FFF9F3;
    font-size: 15px;
    font-family: 'Work Sans', sans-serif;
  }
  input:focus {
    outline: none;
    border-color: #6C3CE9;
  }
  button {
    width: 100%;
    margin-top: 26px;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #6C3CE9;
    color: #FFF9F3;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Work Sans', sans-serif;
    cursor: pointer;
    box-shadow: 0 10px 24px rgba(108,60,233,0.35);
    transition: transform 0.15s ease;
  }
  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    box-shadow: none;
  }
  button:hover:not(:disabled) {
    transform: translateY(-2px);
  }
  .resultat {
    margin-top: 24px;
    display: none;
  }
  .resultat.visible { display: block; }
  .lien-wallet {
    display: block;
    text-align: center;
    padding: 14px;
    border-radius: 10px;
    margin-top: 12px;
    text-decoration: none;
    font-weight: 700;
    font-size: 15px;
  }
  .lien-wallet.google {
    background: #FFF9F3;
    color: #1B1030;
  }
  .lien-wallet.apple {
    background: #000000;
    color: #ffffff;
    border: 1px solid #444;
  }
  .message-erreur {
    color: #FF8080;
    font-size: 14px;
    margin-top: 16px;
    display: none;
  }
  .message-erreur.visible { display: block; }
</style>
</head>
<body>

<div class="logo-page">
  <svg width="22" height="22" viewBox="0 0 200 200"><g transform="rotate(-8 100 100)"><rect x="35" y="55" width="130" height="90" rx="18" fill="#6C3CE9"/></g><path d="M155 45 L163 62 L182 65 L168 79 L172 98 L155 88 L138 98 L142 79 L128 65 L147 62 Z" fill="#12B886"/></svg>
  <div class="nom">Bravo<span class="accent">card</span></div>
</div>

<div class="carte">
  <h1>Bienvenue chez Chez Basile</h1>
  <p class="sous-titre">Créez votre carte de fidélité en quelques secondes</p>

  <form id="formulaire">
    <label for="nom">Votre prénom</label>
    <input type="text" id="nom" required placeholder="Jean">

    <label for="email">Votre email</label>
    <input type="email" id="email" required placeholder="jean@exemple.com">

    <label for="telephone">Votre téléphone (optionnel)</label>
    <input type="tel" id="telephone" placeholder="06 00 00 00 00">

    <button type="submit" id="bouton">Créer ma carte</button>
  </form>

  <div class="message-erreur" id="messageErreur"></div>

  <div class="resultat" id="resultat">
    <p style="text-align:center; margin-bottom: 8px; color:#B8ABD0; font-size:14px;">
      Votre carte est prête ! Ajoutez-la à votre téléphone :
    </p>
    <a href="#" id="lienGoogle" class="lien-wallet google" target="_blank">Ajouter à Google Wallet</a>
    <a href="#" id="lienApple" class="lien-wallet apple" target="_blank">Ajouter à Apple Wallet</a>
  </div>
</div>

<script>
document.getElementById('formulaire').addEventListener('submit', async function(e) {
  e.preventDefault();

  const bouton = document.getElementById('bouton');
  const messageErreur = document.getElementById('messageErreur');
  const resultat = document.getElementById('resultat');

  messageErreur.classList.remove('visible');
  resultat.classList.remove('visible');
  bouton.disabled = true;
  bouton.textContent = 'Création en cours...';

  const nom = document.getElementById('nom').value;
  const email = document.getElementById('email').value;
  const telephone = document.getElementById('telephone').value;

  try {
    const reponse = await fetch('/api/clients', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nom, email, telephone })
    });

    const donnees = await reponse.json();

    if (!reponse.ok) {
      throw new Error(donnees.erreur || 'Une erreur est survenue');
    }

    document.getElementById('lienGoogle').href = donnees.lienWallet;

    if (donnees.lienAppleWallet) {
      document.getElementById('lienApple').href = donnees.lienAppleWallet;
      document.getElementById('lienApple').style.display = 'block';
    } else {
      document.getElementById('lienApple').style.display = 'none';
    }

    resultat.classList.add('visible');
    document.getElementById('formulaire').style.display = 'none';

  } catch (erreur) {
    messageErreur.textContent = erreur.message;
    messageErreur.classList.add('visible');
    bouton.disabled = false;
    bouton.textContent = 'Créer ma carte';
  }
});
</script>

</body>
</html>
