<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Coin des amis - Carte de fidelite</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1b1f24;
    color: #f5f0e6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .carte {
    background: #24292f;
    border-radius: 20px;
    padding: 36px 28px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    border: 1px solid #353b42;
  }
  h1 {
    font-size: 22px;
    margin-bottom: 6px;
    color: #e8a33d;
  }
  p.sous-titre {
    color: #a8a29a;
    font-size: 14px;
    margin-bottom: 28px;
  }
  label {
    display: block;
    font-size: 13px;
    color: #c9c2b6;
    margin-bottom: 6px;
    margin-top: 16px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid #3d434b;
    background: #1b1f24;
    color: #f5f0e6;
    font-size: 15px;
  }
  input:focus {
    outline: none;
    border-color: #e8a33d;
  }
  button {
    width: 100%;
    margin-top: 26px;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: #e8a33d;
    color: #1b1f24;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  button:hover:not(:disabled) {
    background: #f0b45a;
  }
  .resultat {
    margin-top: 24px;
    display: none;
  }
  .resultat.visible { display: block; }
  .lien-wallet {
    display: block;
    text-align: center;
    padding: 14px;
    border-radius: 10px;
    margin-top: 12px;
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
  }
  .lien-wallet.google {
    background: #ffffff;
    color: #1b1f24;
  }
  .lien-wallet.apple {
    background: #000000;
    color: #ffffff;
    border: 1px solid #444;
  }
  .message-erreur {
    color: #ff8080;
    font-size: 14px;
    margin-top: 16px;
    display: none;
  }
  .message-erreur.visible { display: block; }
</style>
</head>
<body>

<div class="carte">
  <h1>Le Coin des amis</h1>
  <p class="sous-titre">Creez votre carte de fidelite en quelques secondes</p>

  <form id="formulaire">
    <label for="nom">Votre prenom</label>
    <input type="text" id="nom" required placeholder="Jean">

    <label for="email">Votre email</label>
    <input type="email" id="email" required placeholder="jean@exemple.com">

    <label for="telephone">Votre telephone (optionnel)</label>
    <input type="tel" id="telephone" placeholder="06 00 00 00 00">

    <button type="submit" id="bouton">Creer ma carte</button>
  </form>

  <div class="message-erreur" id="messageErreur"></div>

  <div class="resultat" id="resultat">
    <p style="text-align:center; margin-bottom: 8px; color:#a8a29a; font-size:14px;">
      Votre carte est prete ! Ajoutez-la a votre telephone :
    </p>
    <a href="#" id="lienGoogle" class="lien-wallet google" target="_blank">Ajouter a Google Wallet</a>
    <a href="#" id="lienApple" class="lien-wallet apple" target="_blank">Ajouter a Apple Wallet</a>
  </div>
</div>

<script>
document.getElementById('formulaire').addEventListener('submit', async function(e) {
  e.preventDefault();

  const bouton = document.getElementById('bouton');
  const messageErreur = document.getElementById('messageErreur');
  const resultat = document.getElementById('resultat');

  messageErreur.classList.remove('visible');
  resultat.classList.remove('visible');
  bouton.disabled = true;
  bouton.textContent = 'Creation en cours...';

  const nom = document.getElementById('nom').value;
  const email = document.getElementById('email').value;
  const telephone = document.getElementById('telephone').value;

  try {
    const reponse = await fetch('/api/clients', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nom, email, telephone })
    });

    const donnees = await reponse.json();

    if (!reponse.ok) {
      throw new Error(donnees.erreur || 'Une erreur est survenue');
    }

    document.getElementById('lienGoogle').href = donnees.lienWallet;

    if (donnees.lienAppleWallet) {
      document.getElementById('lienApple').href = donnees.lienAppleWallet;
      document.getElementById('lienApple').style.display = 'block';
    } else {
      document.getElementById('lienApple').style.display = 'none';
    }

    resultat.classList.add('visible');
    document.getElementById('formulaire').style.display = 'none';

  } catch (erreur) {
    messageErreur.textContent = erreur.message;
    messageErreur.classList.add('visible');
    bouton.disabled = false;
    bouton.textContent = 'Creer ma carte';
  }
});
</script>

</body>
</html>
