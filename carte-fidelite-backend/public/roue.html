<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bravocard - Roue des cadeaux</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Work Sans', sans-serif;
    background: #1B1030;
    color: #FFF9F3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
    overflow-x: hidden;
  }
  .logo-page { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .logo-page .nom { font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 16px; }
  .logo-page .nom .accent { color: #12B886; }
  h1 { font-family: 'Manrope', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 6px; }
  p.sous-titre { color: #B8ABD0; font-size: 14px; margin-bottom: 30px; max-width: 320px; }

  .zone-roue { position: relative; width: 300px; height: 300px; margin-bottom: 30px; }
  .pointeur {
    position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent;
    border-top: 24px solid #FFC93C; z-index: 10;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,0.3));
  }
  .roue {
    width: 300px; height: 300px; border-radius: 50%;
    position: relative;
    border: 6px solid #241A3D;
    box-shadow: 0 0 0 4px #6C3CE9, 0 30px 60px rgba(27,16,48,0.4);
    transition: transform 4.5s cubic-bezier(0.15, 0.85, 0.25, 1);
  }
  .segment-pivot {
    position: absolute; top: 50%; left: 50%; width: 0; height: 0;
  }
  .segment-contenu {
    position: absolute;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    width: 76px;
    left: -38px;
  }
  .segment-contenu .icone-lot { font-size: 20px; line-height: 1; }
  .segment-contenu .texte-lot {
    font-size: 10px; font-weight: 700; font-family: 'Manrope', sans-serif;
    color: #FFF9F3; line-height: 1.15; text-shadow: 0 1px 3px rgba(0,0,0,0.35);
  }
  .centre-roue {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 46px; height: 46px; border-radius: 50%; background: #FFC93C;
    display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 5;
    box-shadow: 0 4px 10px rgba(0,0,0,0.25);
  }

  .bouton {
    padding: 15px 40px; border-radius: 100px; border: none;
    background: #6C3CE9; color: #FFF9F3; font-size: 16px; font-weight: 700;
    font-family: 'Work Sans', sans-serif; cursor: pointer;
    box-shadow: 0 10px 24px rgba(108,60,233,0.35);
    transition: transform 0.15s ease;
  }
  .bouton:hover:not(:disabled) { transform: translateY(-2px); }
  .bouton:disabled { opacity: 0.5; cursor: not-allowed; }

  .resultat-final {
    display: none; margin-top: 26px; padding: 24px 30px; border-radius: 18px;
    background: linear-gradient(160deg, #14301F, #1A3D26); border: 1px solid #12B886; max-width: 320px;
  }
  .resultat-final.visible { display: block; animation: apparition 0.4s ease; }
  @keyframes apparition { from { opacity:0; transform: scale(0.9); } to { opacity:1; transform: scale(1); } }
  .resultat-final .icone-finale { font-size: 36px; margin-bottom: 6px; }
  .resultat-final .titre-gain { font-size: 13px; color: #B8ABD0; }
  .resultat-final .nom-gain { font-family: 'Manrope', sans-serif; font-size: 22px; font-weight: 800; color: #12B886; margin-top: 6px; }

  .message-info { margin-top: 20px; color: #B8ABD0; font-size: 14px; max-width: 300px; }
</style>
</head>
<body>

<div class="logo-page">
  <svg width="20" height="20" viewBox="0 0 200 200"><g transform="rotate(-8 100 100)"><rect x="35" y="55" width="130" height="90" rx="18" fill="#6C3CE9"/></g><path d="M155 45 L163 62 L182 65 L168 79 L172 98 L155 88 L138 98 L142 79 L128 65 L147 62 Z" fill="#12B886"/></svg>
  <div class="nom">Bravo<span class="accent">card</span></div>
</div>

<h1>Merci pour votre avis !</h1>
<p class="sous-titre">Tournez la roue, un cadeau vous attend peut-être.</p>

<div class="zone-roue">
  <div class="pointeur"></div>
  <div class="roue" id="roue">
    <div class="centre-roue">🎁</div>
  </div>
</div>

<button class="bouton" id="boutonJouer">Faire tourner la roue</button>

<div class="resultat-final" id="resultatFinal">
  <div class="icone-finale" id="iconeFinale"></div>
  <div class="titre-gain">Vous avez gagné</div>
  <div class="nom-gain" id="nomGain"></div>
</div>

<div class="message-info" id="messageInfo"></div>

<script>
const COULEURS = ['#6C3CE9', '#12B886', '#5A2FD0', '#0E9469', '#7C4FF0', '#0A7A56'];
const params = new URLSearchParams(window.location.search);
const scanId = params.get('scan');
const roue = document.getElementById('roue');
const boutonJouer = document.getElementById('boutonJouer');
const resultatFinal = document.getElementById('resultatFinal');
const nomGain = document.getElementById('nomGain');
const iconeFinale = document.getElementById('iconeFinale');
const messageInfo = document.getElementById('messageInfo');

let lots = [];
const RAYON_TEXTE = 100; // distance du centre a laquelle placer le texte

function dessinerRoue(listeLots) {
  const nb = listeLots.length;
  const angle = 360 / nb;

  // Le fond colore, un secteur par lot
  let degrades = [];
  listeLots.forEach((lot, i) => {
    const debut = i * angle;
    degrades.push(`${COULEURS[i % COULEURS.length]} ${debut}deg ${debut + angle}deg`);
  });
  roue.style.background = `conic-gradient(${degrades.join(',')})`;

  // Le texte de chaque secteur, place puis oriente pour rester lisible
  listeLots.forEach((lot, i) => {
    const centreAngle = i * angle + angle / 2;

    const pivot = document.createElement('div');
    pivot.className = 'segment-pivot';
    // On tourne le pivot jusqu'au milieu du secteur, l'axe (0,0) reste au centre de la roue
    pivot.style.transform = `rotate(${centreAngle}deg)`;

    const contenu = document.createElement('div');
    contenu.className = 'segment-contenu';
    // On pousse le contenu vers l'exterieur du cercle, puis on annule la rotation du pivot
    // pour que le texte reste bien droit, quelle que soit sa position sur la roue
    contenu.style.transform = `translateY(-${RAYON_TEXTE}px) rotate(${-centreAngle}deg)`;

    contenu.innerHTML = `
      <div class="icone-lot">${lot.icone}</div>
      <div class="texte-lot">${lot.label}</div>
    `;

    pivot.appendChild(contenu);
    roue.appendChild(pivot);
  });
}

function lancerConfettis() {
  const dureeMs = 2200;
  const fin = Date.now() + dureeMs;
  const couleurs = ['#6C3CE9', '#12B886', '#FFC93C', '#FFF9F3'];

  (function frame() {
    confetti({
      particleCount: 4,
      angle: 60,
      spread: 70,
      origin: { x: 0, y: 0.6 },
      colors: couleurs
    });
    confetti({
      particleCount: 4,
      angle: 120,
      spread: 70,
      origin: { x: 1, y: 0.6 },
      colors: couleurs
    });
    if (Date.now() < fin) requestAnimationFrame(frame);
  })();

  confetti({ particleCount: 90, spread: 100, origin: { y: 0.5 }, colors: couleurs });
}

async function initialiser() {
  if (!scanId) {
    messageInfo.textContent = "Lien invalide. Utilisez le lien reçu par email.";
    boutonJouer.disabled = true;
    return;
  }

  try {
    const reponse = await fetch(`/api/roue/${scanId}`);
    const donnees = await reponse.json();

    if (!reponse.ok) {
      messageInfo.textContent = donnees.erreur || "Ce lien n'est plus valide.";
      boutonJouer.disabled = true;
      return;
    }

    lots = donnees.lots;
    dessinerRoue(lots);

    if (!donnees.peutJouer) {
      boutonJouer.disabled = true;
      if (donnees.cadeauDejaGagne) {
        nomGain.textContent = donnees.cadeauDejaGagne;
        iconeFinale.textContent = '🎉';
        resultatFinal.classList.add('visible');
        messageInfo.textContent = "Vous avez déjà joué avec ce lien.";
      }
    }
  } catch (erreur) {
    messageInfo.textContent = "Une erreur est survenue.";
    boutonJouer.disabled = true;
  }
}

boutonJouer.addEventListener('click', async () => {
  boutonJouer.disabled = true;
  messageInfo.textContent = '';

  try {
    const reponse = await fetch(`/api/roue/${scanId}/jouer`, { method: 'POST' });
    const donnees = await reponse.json();

    if (!reponse.ok) {
      messageInfo.textContent = donnees.erreur || "Impossible de jouer.";
      return;
    }

    const nb = lots.length;
    const angleSegment = 360 / nb;
    const centreSegment = donnees.indexLot * angleSegment + angleSegment / 2;
    const rotationFinale = 360 * 6 + (360 - centreSegment);

    roue.style.transform = `rotate(${rotationFinale}deg)`;

    setTimeout(() => {
      nomGain.textContent = donnees.label;
      iconeFinale.textContent = donnees.icone;
      resultatFinal.classList.add('visible');
      lancerConfettis();
    }, 4600);

  } catch (erreur) {
    messageInfo.textContent = "Une erreur est survenue.";
    boutonJouer.disabled = false;
  }
});

initialiser();
</script>

</body>
</html>
