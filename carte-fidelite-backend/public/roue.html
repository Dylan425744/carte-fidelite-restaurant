<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
    <link rel="icon" href="/logo-bravocard-encadre.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bravocard - Roue des cadeaux</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Work Sans', sans-serif;
    background: #1B1030;
    color: #FFF9F3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
    overflow-x: hidden;
  }
  .logo-page { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .logo-page .nom { font-family: 'Manrope', sans-serif; font-weight: 800; font-size: 16px; }
  .logo-page .nom .accent { color: #12B886; }
  h1 { font-family: 'Manrope', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 6px; }
  p.sous-titre { color: #B8ABD0; font-size: 14px; margin-bottom: 30px; max-width: 320px; }

  .zone-roue { position: relative; width: 300px; height: 300px; margin-bottom: 30px; }
  .pointeur {
    position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent;
    border-top: 24px solid #FFC93C; z-index: 10;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,0.3));
  }
  .roue {
    width: 300px; height: 300px; border-radius: 50%;
    position: relative;
    border: 6px solid #241A3D;
    box-shadow: 0 0 0 4px #6C3CE9, 0 30px 60px rgba(27,16,48,0.4);
    transition: transform 4.5s cubic-bezier(0.15, 0.85, 0.25, 1);
  }
  .segment-pivot {
    position: absolute; top: 50%; left: 50%; width: 0; height: 0;
  }
  .segment-contenu {
    position: absolute;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    width: 76px;
    left: -38px;
  }
  .segment-contenu .icone-lot { font-size: 20px; line-height: 1; }
  .segment-contenu .texte-lot {
    font-size: 10px; font-weight: 700; font-family: 'Manrope', sans-serif;
    color: #FFF9F3; line-height: 1.15; text-shadow: 0 1px 3px rgba(0,0,0,0.35);
  }
  .centre-roue {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 46px; height: 46px; border-radius: 50%; background: #FFC93C;
    display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 5;
    box-shadow: 0 4px 10px rgba(0,0,0,0.25);
  }

  .bouton {
    padding: 15px 40px; border-radius: 100px; border: none;
    background: #6C3CE9; color: #FFF9F3; font-size: 16px; font-weight: 700;
    font-family: 'Work Sans', sans-serif; cursor: pointer;
    box-shadow: 0 10px 24px rgba(108,60,233,0.35);
    transition: transform 0.15s ease;
  }
  .bouton:hover:not(:disabled) { transform: translateY(-2px); }
  .bouton:disabled { opacity: 0.5; cursor: not-allowed; }

  .resultat-final {
    display: none; margin-top: 26px; padding: 24px 30px; border-radius: 18px;
    background: linear-gradient(160deg, #14301F, #1A3D26); border: 1px solid #12B886; max-width: 320px;
  }
  .resultat-final.visible { display: block; animation: apparition 0.4s ease; }
  @keyframes apparition { from { opacity:0; transform: scale(0.9); } to { opacity:1; transform: scale(1); } }
  .resultat-final .icone-finale { font-size: 36px; margin-bottom: 6px; }
  .resultat-final .titre-gain { font-size: 13px; color: #B8ABD0; }
  .resultat-final .nom-gain { font-family: 'Manrope', sans-serif; font-size: 22px; font-weight: 800; color: #12B886; margin-top: 6px; }
  .resultat-final .validite {
    margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(18,184,134,0.3);
    font-size: 12.5px; color: #C9F0E2; line-height: 1.5;
  }
  .resultat-final .validite b { color: #FFF9F3; }

  .message-info { margin-top: 20px; color: #B8ABD0; font-size: 14px; max-width: 300px; }

  /* Direction artistique de la roue : une scène de jeu, pas un simple disque. */
  body { background: radial-gradient(circle at 50% 14%, #50357c 0, transparent 28%), radial-gradient(circle at 84% 84%, #145f51 0, transparent 26%), #120c20; }
  .logo-page { position: relative; z-index: 1; }
  .sous-titre { position: relative; z-index: 1; }
  .zone-roue { width: 340px; height: 340px; margin: 4px 0 34px; isolation: isolate; }
  .zone-roue:before { content: ''; position: absolute; inset: 1px; z-index: -2; border-radius: 50%; background: radial-gradient(circle, rgba(255,210,100,.16) 0, rgba(136,83,244,.14) 48%, transparent 70%); filter: blur(7px); animation: respiration 3.1s ease-in-out infinite; }
  .zone-roue:after { content: ''; position: absolute; inset: -12px; z-index: -1; border: 1px solid rgba(255,255,255,.13); border-radius: 50%; box-shadow: 0 0 0 10px rgba(255,255,255,.025), 0 0 42px rgba(123,78,221,.32); }
  @keyframes respiration { 50% { transform: scale(1.08); opacity: .55; } }
  .pointeur { top: -5px; border-left-width: 17px; border-right-width: 17px; border-top: 34px solid #ffe08a; filter: drop-shadow(0 4px 4px rgba(0,0,0,.42)); }
  .roue { width: 330px; height: 330px; margin: 5px; border: 8px solid #21162e; box-shadow: 0 0 0 3px #ead3ff, 0 0 0 8px #7148e8, 0 28px 58px rgba(4,1,10,.48); transition: transform 5.2s cubic-bezier(.12,.8,.18,1); overflow: hidden; }
  .roue:before { content: ''; position: absolute; inset: 8px; border: 1px solid rgba(255,255,255,.32); border-radius: 50%; pointer-events: none; }
  .segment-contenu { width: 84px; left: -42px; gap: 5px; }
  .segment-contenu .icone-lot { font-size: 23px; }
  .segment-contenu .texte-lot { font-size: 10px; letter-spacing: -.1px; }
  .centre-roue { width: 62px; height: 62px; border: 5px solid #fff7d4; background: radial-gradient(circle at 35% 30%, #fff6b3, #f2b944); font-size: 24px; box-shadow: 0 5px 14px rgba(0,0,0,.34); }
  .bouton { position: relative; overflow: hidden; min-width: 250px; padding: 16px 40px; background: linear-gradient(120deg, #7448df, #9b6bff); box-shadow: 0 13px 30px rgba(101,58,207,.42); }
  .bouton:before { content: ''; position: absolute; top: -80%; left: -25%; width: 25%; height: 260%; background: rgba(255,255,255,.22); transform: rotate(22deg); transition: left .4s ease; }
  .bouton:hover:not(:disabled):before { left: 115%; }
  .resultat-final { border-color: rgba(93,230,167,.75); box-shadow: 0 19px 43px rgba(0,0,0,.25); }

  /* Icones professionnelles remplacant les emojis : recolorees a l'identique
     du texte (#FFF9F3) via un masque, le centre garde ses couleurs d'origine. */
  .icone-glyphe { display: inline-block; background-color: #FFF9F3; -webkit-mask: var(--icone-src) center / contain no-repeat; mask: var(--icone-src) center / contain no-repeat; }
  .icone-lot .icone-glyphe { width: 24px; height: 24px; }
  .icone-finale .icone-glyphe { width: 38px; height: 38px; }
  .centre-roue img { width: 30px; height: 30px; object-fit: contain; }
</style>
</head>
<body>

<div class="logo-page">
  <svg width="20" height="20" viewBox="0 0 200 200"><g transform="rotate(-8 100 100)"><rect x="35" y="55" width="130" height="90" rx="18" fill="#6C3CE9"/></g><path d="M155 45 L163 62 L182 65 L168 79 L172 98 L155 88 L138 98 L142 79 L128 65 L147 62 Z" fill="#12B886"/></svg>
  <div class="nom">Bravo<span class="accent">card</span></div>
</div>

<h1>Merci pour votre avis !</h1>
<p class="sous-titre">Tournez la roue, un cadeau vous attend peut-être.<br><small>Un seul tour sécurisé pour votre passage.</small></p>

<div class="zone-roue">
  <div class="pointeur"></div>
  <div class="roue" id="roue">
    <div class="centre-roue"><img src="/roue-icones/cadeau-centre.png" alt=""></div>
  </div>
</div>

<button class="bouton" id="boutonJouer">Faire tourner la roue</button>

<div class="resultat-final" id="resultatFinal">
  <div class="icone-finale" id="iconeFinale"></div>
  <div class="titre-gain">Vous avez gagné</div>
  <div class="nom-gain" id="nomGain"></div>
  <div class="validite" id="validite"></div>
</div>

<div class="message-info" id="messageInfo"></div>

<script>
const COULEURS = ['#6C3CE9', '#12B886', '#5A2FD0', '#0E9469', '#7C4FF0', '#0A7A56'];
const params = new URLSearchParams(window.location.search);
const scanId = params.get('scan');
const roue = document.getElementById('roue');
const boutonJouer = document.getElementById('boutonJouer');
const resultatFinal = document.getElementById('resultatFinal');
const nomGain = document.getElementById('nomGain');
const iconeFinale = document.getElementById('iconeFinale');
const validite = document.getElementById('validite');
const messageInfo = document.getElementById('messageInfo');

function formaterDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' });
}

function afficherValidite(valideDu, valideAu) {
  if (!valideDu || !valideAu) {
    validite.innerHTML = '';
    return;
  }
  validite.innerHTML =
    `Non consommable aujourd'hui. Votre boisson sera disponible ` +
    `à partir du <b>${formaterDate(valideDu)}</b>, jusqu'au <b>${formaterDate(valideAu)}</b>. ` +
    `Présentez simplement votre carte au restaurant durant cette période.`;
}

let lots = [];
const RAYON_TEXTE = 112; // distance du centre a laquelle placer le texte

function echapper(valeur) {
  const element = document.createElement('div');
  element.textContent = valeur == null ? '' : String(valeur);
  return element.innerHTML;
}

// Icones professionnelles remplacant les emojis par defaut. Un lot personnalise
// avec un emoji hors de cette liste retombe simplement sur l'emoji saisi.
const ICONES_ROUE = {
  '🍽️': 'repas.png',
  '🏷️': 'reduction.png',
  '🍰': 'dessert.png',
  '🥤': 'boisson.png',
  '🔁': 'rejouer.png',
  '🙈': 'match.png',
  '✨': 'match.png',
  '🎁': 'cadeau.png'
};

function rendreIconeLot(emoji) {
  const fichier = ICONES_ROUE[String(emoji || '').trim()];
  return fichier
    ? `<span class="icone-glyphe" style="--icone-src:url(/roue-icones/${fichier})"></span>`
    : echapper(emoji);
}

function paletteRoue(couleurPrincipale, couleurSecondaire) {
  // Personnalisation du restaurant si les deux couleurs sont definies,
  // sinon la palette variee par defaut.
  return (couleurPrincipale && couleurSecondaire) ? [couleurPrincipale, couleurSecondaire] : COULEURS;
}

function dessinerRoue(listeLots, couleurPrincipale, couleurSecondaire) {
  const nb = listeLots.length;
  const angle = 360 / nb;
  const palette = paletteRoue(couleurPrincipale, couleurSecondaire);

  // Le fond colore, un secteur par lot
  let degrades = [];
  listeLots.forEach((lot, i) => {
    const debut = i * angle;
    degrades.push(`${palette[i % palette.length]} ${debut}deg ${debut + angle}deg`);
  });
  roue.style.background = `conic-gradient(${degrades.join(',')})`;

  // Le texte de chaque secteur, place puis oriente pour rester lisible
  listeLots.forEach((lot, i) => {
    const centreAngle = i * angle + angle / 2;

    const pivot = document.createElement('div');
    pivot.className = 'segment-pivot';
    // On tourne le pivot jusqu'au milieu du secteur, l'axe (0,0) reste au centre de la roue
    pivot.style.transform = `rotate(${centreAngle}deg)`;

    const contenu = document.createElement('div');
    contenu.className = 'segment-contenu';
    // On pousse le contenu vers l'exterieur du cercle, puis on annule la rotation du pivot
    // pour que le texte reste bien droit, quelle que soit sa position sur la roue
    contenu.style.transform = `translateY(-${RAYON_TEXTE}px) rotate(${-centreAngle}deg)`;

    contenu.innerHTML = `
      <div class="icone-lot">${rendreIconeLot(lot.icone)}</div>
      <div class="texte-lot">${echapper(lot.label)}</div>
    `;

    pivot.appendChild(contenu);
    roue.appendChild(pivot);
  });
}

function lancerConfettis() {
  const dureeMs = 2200;
  const fin = Date.now() + dureeMs;
  const couleurs = ['#6C3CE9', '#12B886', '#FFC93C', '#FFF9F3'];

  (function frame() {
    confetti({
      particleCount: 4,
      angle: 60,
      spread: 70,
      origin: { x: 0, y: 0.6 },
      colors: couleurs
    });
    confetti({
      particleCount: 4,
      angle: 120,
      spread: 70,
      origin: { x: 1, y: 0.6 },
      colors: couleurs
    });
    if (Date.now() < fin) requestAnimationFrame(frame);
  })();

  confetti({ particleCount: 90, spread: 100, origin: { y: 0.5 }, colors: couleurs });
}

async function initialiser() {
  if (!scanId) {
    messageInfo.textContent = "Lien invalide. Utilisez le lien reçu par email.";
    boutonJouer.disabled = true;
    return;
  }

  try {
    const reponse = await fetch(`/api/roue/${scanId}`);
    const donnees = await reponse.json();

    if (!reponse.ok) {
      messageInfo.textContent = donnees.erreur || "Ce lien n'est plus valide.";
      boutonJouer.disabled = true;
      return;
    }

    lots = donnees.lots;
    dessinerRoue(lots, donnees.couleurPrincipale, donnees.couleurSecondaire);

    if (!donnees.peutJouer) {
      boutonJouer.disabled = true;
      if (donnees.cadeauDejaGagne) {
        nomGain.textContent = donnees.cadeauDejaGagne;
        iconeFinale.textContent = '🎉';
        afficherValidite(donnees.valideDu, donnees.valideAu);
        resultatFinal.classList.add('visible');
        messageInfo.textContent = "Vous avez déjà joué avec ce lien.";
      }
    }
  } catch (erreur) {
    messageInfo.textContent = "Une erreur est survenue.";
    boutonJouer.disabled = true;
  }
}

let rotationActuelle = 0;

boutonJouer.addEventListener('click', async () => {
  boutonJouer.disabled = true;
  messageInfo.textContent = '';

  try {
    const reponse = await fetch(`/api/roue/${scanId}/jouer`, { method: 'POST' });
    const donnees = await reponse.json();

    if (!reponse.ok) {
      messageInfo.textContent = donnees.erreur || "Impossible de jouer.";
      boutonJouer.disabled = false;
      return;
    }

    const nb = lots.length;
    const angleSegment = 360 / nb;
    const centreSegment = donnees.indexLot * angleSegment + angleSegment / 2;
    // Rotation cumulee depuis la position actuelle, pour qu'un rejeu tourne a
    // nouveau plusieurs tours au lieu d'un petit saut vers la valeur absolue.
    const cible = (360 - centreSegment) % 360;
    const positionActuelle = ((rotationActuelle % 360) + 360) % 360;
    const mouvementVersCible = (cible - positionActuelle + 360) % 360;
    rotationActuelle += 360 * 6 + mouvementVersCible;

    roue.style.transform = `rotate(${rotationActuelle}deg)`;

    setTimeout(() => {
      if (donnees.type === 'rejouer') {
        messageInfo.textContent = 'Rejouez ! Retentez votre chance.';
        boutonJouer.disabled = false;
        return;
      }
      nomGain.textContent = donnees.label;
      iconeFinale.innerHTML = rendreIconeLot(donnees.icone);
      afficherValidite(donnees.valideDu, donnees.valideAu);
      resultatFinal.classList.add('visible');
      lancerConfettis();
    }, 5300);

  } catch (erreur) {
    messageInfo.textContent = "Une erreur est survenue.";
    boutonJouer.disabled = false;
  }
});

initialiser();
</script>

</body>
</html>
