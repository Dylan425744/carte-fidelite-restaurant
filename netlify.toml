[build]
  publish = "carte-fidelite-backend/public"

[[redirects]]
  from = "/r/*"
  to = "https://carte-fidelite-restaurant.onrender.com/r/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/avis/*"
  to = "https://carte-fidelite-restaurant.onrender.com/avis/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://carte-fidelite-restaurant.onrender.com/api/:splat"
  status = 200
  force = true
